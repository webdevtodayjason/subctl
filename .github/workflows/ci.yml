name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: No-secrets gate
        run: bash scripts/check-no-secrets.sh

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Shellcheck
        # macOS runner uses /bin/bash 3.2 by default — avoid mapfile/globstar.
        # find + xargs is portable across bash 3.2 and 5.x.
        run: |
          find install.sh uninstall.sh bin lib providers scripts \
            \( -name '*.sh' -o -path 'bin/subctl' \) -type f > /tmp/sh_files.txt
          echo "Files to check:"
          cat /tmp/sh_files.txt
          xargs shellcheck -x --severity=error < /tmp/sh_files.txt

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build-check dashboard
        # `bun --check` evaluates the file (which would start Bun.serve and hang).
        # `bun build` parses + bundles without running, exits non-zero on errors.
        run: bun build dashboard/server.ts --target=bun --outdir=/tmp/subctl-build-check

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build-check deck (Go TUI)
        run: |
          cd deck
          go vet ./...
          go build -o /tmp/subctl-deck-bin .

