# config/policy/test-vectors.toml
# Shared test corpus for the policy engine. Per .orchestration/handoff-pack/07-cli-subcommand-policy.md §11:
# "Both the Go CLI and the TypeScript master implementation run this corpus.
#  Disagreement between them = CI failure."
#
# Vector format (pack 07 §11):
#   [[vector]]
#   name = "<human description>"
#   policy = "<preset-name>"          # one of: node, python, generic
#   command = "<raw command line>"
#   expected = "allow" | "deny"
#   expected_rule_path = "<dot-path into the resolved policy doc>"
#
# Coverage targets (per dispatch brief + pack 11 §5):
#   - ≥10 vectors per preset (node, python, generic)
#   - every major rule class: allow.commands, allow_pattern positive/negative,
#     deny_if_arg_contains, deny_always.substrings, deny_always.regex,
#     ecosystem-specific (npm.allowed_scripts, python_modules.allowed,
#     uv.allowed_run_targets, etc.), and default deny
#   - every adversarial attack class from pack 11 §5 (rm -rf variants,
#     find -delete, inline interpreters, curl|sh, dotfile writes,
#     source /tmp, chmod -R 777, fork bomb, dd, npm undeclared, cd indirection)
#   - ≥2 documented false-positive-acceptance vectors (pack 11 §5.1)
#   - positive-allow happy-path vectors (developer common case)
#
# expected_rule_path is best-effort — for deny_always.regex cases the path is
# `mode.gated.deny_always.regex`; for deny_always.substrings it is
# `mode.gated.deny_always.substrings`; for ecosystem-specific tables it is
# the table path (e.g. `mode.gated.npm.allowed_scripts`). allow_pattern paths
# use the array index in the resolved policy (`mode.gated.allow_pattern[N]`).
# A `default-deny` (no rule matched) uses path `mode.gated.default_deny`.

