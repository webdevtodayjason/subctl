# config/policy/defaults.toml
# Shipped defaults — lowest-priority policy in the resolution chain.
# Per docs/policy-schema.md §1, this file ships with subctl and is the
# fallback when no project policy, no user config, and no preset apply.
# If a project's ecosystem is detected, the corresponding preset
# (config/policy/presets/<eco>.toml) provides the gated allowlist.
# This file is the floor: it sets the default mode and the most
# universal deny_always set that always applies regardless of preset.

default_mode = "gated"

# v2.7.8 — floor preset. When a project doesn't ship its own
# `.subctl/policy.toml` with an explicit preset, AND the operator's
# `~/.config/subctl/policy.toml` doesn't set one either, this is the
# preset that gets merged. Before this floor existed, fresh projects
# (no markers detected) booted into gated mode with NO allowlist,
# making the worker ask permission for every `ls` / `cat` / `find`.
# Operator-observed regression vs pre-v2.7 — "Bureaucrat Agent" feel.
preset = "generic"

[mode.gated]

[mode.gated.deny_always]
substrings = [
  # The most universally-destructive patterns. Presets may add more.
  "rm -rf /",
  "rm -rf $HOME",
  ":(){:|:&};:",
  ":(){ :|:& };:",
  "dd if=/dev/zero of=/dev/sd",
  "mkfs.",
  "shred -uvz",
]

regex = [
  # The single most important rule — close inline interpreters
  # everywhere, even before any preset loads.
  '\bnode\s+-e\b',
  '\bpython3?\s+-c\b',
  '\bbash\s+-c\b',
  '\bsh\s+-c\b',
]
